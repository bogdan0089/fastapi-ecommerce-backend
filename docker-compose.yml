version: "3.9"

services:
  db:
    image: postgres:15
    container_name: db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  backend_system_app:
    build: .
    container_name: api
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - db
    ports:
      - "8000:8000"

  celery_worker:
    build: .
    container_name: celery_worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: celery -A celery_app worker --loglevel=info

volumes:
  pgdata: